name: Publicar demostración de reservas

on:
  push:
    branches: [main]
    paths:
      - "web-reservas/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-reservas/package-lock.json

      - name: Preparar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Instalar dependencias
        working-directory: web-reservas
        run: npm ci

      - name: Compilar la página
        working-directory: web-reservas
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Empaquetar la página
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-reservas/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
